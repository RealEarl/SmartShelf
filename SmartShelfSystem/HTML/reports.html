<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/reports.css') }}">
</head>
<body>
    <nav id="sidebar">
        <ul>
            <li class="name">
                <h1 class="name-logo">Smart<span>SHELF</span></h1>
                <button id="toggle-btn">
                    <img src="{{ url_for('static', filename='Icons/arrow-left.svg') }}">
                </button>
            </li>
    <div class="main-dash">
            <div class="nav-links">
                <li >
                    <a href="home.html">
                        <img src="{{ url_for('static', filename='Icons/dashboard.svg') }}">
                        <span class="pang-hover">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="shelves.html">
                        <img src="{{ url_for('static', filename='Icons/shelves.svg') }}">
                        <span class="pang-hover">Shelves</span>
                    </a>
                </li>
                <li class="active">
                    <a href="reports.html">
                        <img src="{{ url_for('static', filename='Icons/reports.svg') }}">
                        <span>Reports</span>
                    </a>
                </li>
                <li>
                    <a href="settings.html">
                        <img src="{{ url_for('static', filename='Icons/settings.svg') }}">
                        <span class="pang-hover">Settings</span>
                    </a>
                </li>
            </div>

                <div class="logout">
                    <span class="signout">Sign Out</span>
                    <button class="logout-btn" id="logout-btn">
                        <img src="{{ url_for('static', filename='Icons/logout.png') }}">
                    </button>
                </div>
            </div>
        </ul>
    </nav>

     <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="content-wrapper">

            <!-- TOP SECTION -->
            <div class="overview-spoilage-over-time">
                <div class="freshness">
                    <span>Freshness Overview</span>
                    <div class="overview">
                        <ul>
                            <li>Fresh: <span id="freshCount">0</span></li>
                            <hr>
                            <li>Need Attention: <span id="attentionCount">0</span></li>
                            <hr>
                            <li>Spoiled: <span id="spoiledCount">0</span></li>
                            <hr>
                        </ul>
                    </div>
                </div>

                <div class="spoilage-overtime">
                    <span>Spoilage Overtime</span>

                    <!-- 🔥 BAR GRAPH CONTAINER -->
                    <div id="bar-graph-container">
                        <!-- dito mo ilalagay chart (Chart.js or canvas or div bars) -->
                    </div>

                </div>
            </div>

            <!-- TABLE -->
            <div class="container-table">
                <div class="table-header">
                    <div class="col-fruit">Fruit</div>
                    <div class="col-status">Status</div>
                    
                    <div class="col-time">Time</div>
                </div>

                <div class="table-body">
                    <div class="table-row">
                        <div class="col-fruit">
                            <img src="{{ url_for('static', filename='IMAGE/pear-image.png') }}" class="fruit-img">
                            <span>Pear</span>
                        </div>
                        <div class="col-status" id="status-pear">[Status]</div>
                       
                        <div class="col-time" id="time-pear">[Time]</div>
                    </div>

                    <div class="table-row">
                        <div class="col-fruit">
                            <img src="{{ url_for('static', filename='IMAGE/avocado-image.png') }}" class="fruit-img">
                            <span>Avocado</span>
                        </div>
                        <div class="col-status" id="status-avocado">[Status]</div>
                       
                        <div class="col-time" id="time-avocado">[Time]</div>
                    </div>
                </div>
            </div>

        </div>
    </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<script type="module" src="{{ url_for('static', filename='JS/reports.js') }}"></script>
</body>
</html>
